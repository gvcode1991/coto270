<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pulso de Ventas</title>

    <link rel="stylesheet" href="src/styles.css?v=5.9.0" />
  </head>
  <body>
    <div id="root">
      <section class="empty-view app-startup-fallback">
        <img src="assets/images/pulso-de-ventas-icon.png" alt="" aria-hidden="true" />
        <h1>Cargando Pulso de Ventas</h1>
        <p>Preparando la aplicacion...</p>
      </section>
    </div>
    <script>
      (function () {
        var root = document.getElementById("root");

        function mostrarError(mensaje) {
          if (!root) return;
          root.innerHTML =
            '<section class="empty-view app-error-fallback">' +
            '<img src="assets/images/pulso-de-ventas-icon.png" alt="" aria-hidden="true" />' +
            "<h1>No se pudo abrir Pulso de Ventas</h1>" +
            "<p>" + mensaje + "</p>" +
            "</section>";
        }

        function cargarScript(src, timeoutMs) {
          return new Promise(function (resolve, reject) {
            var script = document.createElement("script");
            var terminado = false;
            var timeout = window.setTimeout(function () {
              if (terminado) return;
              terminado = true;
              script.onload = null;
              script.onerror = null;
              reject(new Error("Tiempo agotado cargando " + src));
            }, timeoutMs || 12000);

            script.onload = function () {
              if (terminado) return;
              terminado = true;
              window.clearTimeout(timeout);
              resolve();
            };
            script.onerror = function () {
              if (terminado) return;
              terminado = true;
              window.clearTimeout(timeout);
              reject(new Error("No se pudo cargar " + src));
            };
            script.src = src;
            document.body.appendChild(script);
          });
        }

        cargarScript("/vendor/react.production.min.js")
          .then(function () {
            return cargarScript("/vendor/react-dom.production.min.js");
          })
          .then(function () {
            cargarScript("/vendor/xlsx.full.min.js", 6000).catch(function () {});

            var script = document.createElement("script");
            script.type = "module";
            script.src = "src/main.js?v=5.9.0";
            script.onerror = function () {
              mostrarError("No se pudo cargar el archivo principal de la app. Intente actualizar la pagina.");
            };
            document.body.appendChild(script);
          })
          .catch(function () {
            mostrarError("Safari no pudo cargar las librerias base. Revise la conexion y vuelva a abrir la pagina.");
          });
      })();
    </script>
  </body>
</html>
