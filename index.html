<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ranking Comercial Elaborados</title>

    <link rel="stylesheet" href="styles.css" />

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  </head>
<body>
  <div class="container">
    <h1>Ranking Semanal Elaborados</h1>

    <label for="archivo">Archivo de ventas</label>
    <input type="file" id="archivo" accept=".xlsx,.xls,.ods" />

    <button id="generarRanking" type="button">Generar Ranking</button>

    <div id="mensaje" role="status" aria-live="polite"></div>
    <div id="resultado" aria-live="polite"></div>
    <div id="paginacion" aria-label="Paginacion"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
