<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pulso de Ventas</title>

    <link rel="stylesheet" href="styles.css" />

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  </head>
<body>
  <div class="app-shell">
    <aside id="menuLateral" class="sidebar" aria-label="Menu lateral">
      <button id="menuToggle" class="menu-toggle" type="button" aria-controls="menuLateral" aria-expanded="false">
        <img src="assets/pulso-de-ventas-icon.png" alt="" aria-hidden="true" />
        <span class="menu-toggle-symbol" aria-hidden="true">+</span>
      </button>

      <div class="sidebar-header">
        <img class="sidebar-brand-logo" src="assets/pulso-de-ventas-logo.png" alt="Pulso de Ventas" />
        <strong>Elaborados</strong>
      </div>

      <nav class="sidebar-nav" aria-label="Secciones">
        <a class="active" href="#carga">Cargar archivo</a>
        <a href="#resultado">Ranking</a>
        <details class="sidebar-dropdown">
          <summary>Ranking por DTO</summary>
          <div id="menuDto" class="sidebar-subnav"></div>
        </details>
      </nav>

      <div class="sidebar-meta">
        <span class="version-label">Version tabla v14</span>
      </div>
    </aside>

    <main class="container">
      <section id="carga" class="tool-section">
        <h1>Ranking Semanal Elaborados</h1>

        <label for="archivo">Archivo de ventas</label>
        <input type="file" id="archivo" accept=".xlsx,.xls,.ods" />

        <button id="generarRanking" type="button">Generar Ranking</button>
      </section>

      <div id="mensaje" role="status" aria-live="polite"></div>
      <div id="resultado" aria-live="polite"></div>
      <div id="paginacion" aria-label="Paginacion"></div>
      <section id="rankingDto" class="dto-section" aria-live="polite"></section>

      <footer class="site-footer">
        <p>Copyright 2026 Pulso de Ventas. Todos los derechos reservados.</p>
        <p>Uso interno. La informacion generada esta sujeta a validacion comercial y a los terminos legales de la empresa.</p>
      </footer>
    </main>
  </div>

  <div id="menuOverlay" class="menu-overlay" hidden></div>

  <script src="app.coto270.v10.js?v=14"></script>
</body>
</html>
